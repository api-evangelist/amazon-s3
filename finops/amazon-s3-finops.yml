specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Amazon S3
providerId: amazon-s3
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - AWS
  - Object Storage
  - S3
  - Cost Management
description: 'FOCUS-aligned FinOps for Amazon S3: per-GB-month storage by class, per-1,000-request charges
  by verb and class, tiered egress with a 100 GB/month free pool, plus separately metered features (replication,
  inventory, retrieval, lifecycle transitions, S3 Tables).'
sources:
  - https://aws.amazon.com/s3/pricing/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Amazon Web Services, Inc.
serviceCategory: Storage / Object Storage
billingModel:
  pricingCategory: Pay-As-You-Go
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
focusColumns:
  ServiceName: Amazon Simple Storage Service
  ServiceCategory: Storage
  ServiceSubcategory: Object Storage
  ProviderName: AWS
  PublisherName: Amazon Web Services, Inc.
  InvoiceIssuerName: Amazon Web Services, Inc.
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: storage_gb_month
    unit: GB-month
    aggregation: avg
    dimensions:
      - region
      - bucket
      - storage_class
  - name: requests
    unit: request
    aggregation: sum
    dimensions:
      - region
      - bucket
      - operation
      - storage_class
  - name: data_transfer_gb
    unit: GB
    aggregation: sum
    dimensions:
      - region
      - direction
      - destination
  - name: cross_region_replication_gb
    unit: GB
    aggregation: sum
    dimensions:
      - source_region
      - destination_region
  - name: lifecycle_transitions
    unit: object
    aggregation: sum
    dimensions:
      - region
      - bucket
      - source_class
      - destination_class
  - name: glacier_retrieval_gb
    unit: GB
    aggregation: sum
    dimensions:
      - region
      - bucket
      - retrieval_tier
  - name: inventory_objects
    unit: object
    aggregation: sum
    dimensions:
      - region
      - bucket
principles:
  - name: Visibility
    description: Use S3 Storage Lens (free metrics, advanced metrics paid), Cost Explorer with the S3 dimension,
      bucket-level CloudWatch metrics, and CUR / FOCUS export for object-level cost.
  - name: Allocation
    description: Tag buckets with Application, Team, Environment; use cost allocation tags so charges flow
      through FOCUS columns; use S3 Storage Lens groups for grouping prefixes.
  - name: Optimization
    description: Use S3 Intelligent-Tiering for unknown access patterns, lifecycle policies to transition
      cold data to Glacier classes, S3 Storage Lens recommendations to find inefficient prefixes, multi-part
      upload cleanup, and CloudFront in front of public buckets to reduce egress.
  - name: Accountability
    description: Set AWS Budgets per bucket tag, configure anomaly detection on data transfer, and review
      Storage Lens dashboards monthly with bucket owners.
maintainers:
