components:
  securitySchemes:
    sigv4:
      type: apiKey
      name: Authorization
      in: header
      description: >-
        AWS Signature Version 4 authentication. All S3 REST API requests must be
        signed using AWS Signature Version 4. The signature includes the request
        date, region, service name (s3), and request hash.
  parameters:
    BucketName:
      name: Bucket
      in: path
      required: true
      description: >-
        The name of the bucket. Bucket names must be between 3 and 63 characters
        long, consist only of lowercase letters, numbers, hyphens, and periods,
        and must begin and end with a letter or number.
      schema:
        type: string
        minLength: 3
        maxLength: 63
        pattern: '^[a-z0-9][a-z0-9.\-]{1,61}[a-z0-9]$'
    ObjectKey:
      name: Key+
      in: path
      required: true
      description: >-
        Key name of the object. The object key can be up to 1,024 bytes in
        length and may contain any UTF-8 characters.
      schema:
        type: string
        minLength: 1
        maxLength: 1024
  schemas:
    ListAllMyBucketsResult:
      type: object
      description: Container for the result of the ListBuckets operation.
      xml:
        name: ListAllMyBucketsResult
        namespace: http://s3.amazonaws.com/doc/2006-03-01/
      properties:
        Owner:
          $ref: '#/components/schemas/Owner'
        Buckets:
          type: object
          properties:
            Bucket:
              type: array
              items:
                $ref: '#/components/schemas/Bucket'
    Bucket:
      type: object
      description: In terms of implementation, a Bucket is a resource.
      properties:
        Name:
          type: string
          description: The name of the bucket.
        CreationDate:
          type: string
          format: date-time
          description: Date the bucket was created.
    Owner:
      type: object
      description: Container for the owner's display name and ID.
      properties:
        DisplayName:
          type: string
          description: Container for the display name of the owner.
        ID:
          type: string
          description: Container for the ID of the owner.
    CreateBucketConfiguration:
      type: object
      description: The configuration information for the bucket.
      xml:
        name: CreateBucketConfiguration
        namespace: http://s3.amazonaws.com/doc/2006-03-01/
      properties:
        LocationConstraint:
          type: string
          description: >-
            Specifies the Region where the bucket will be created. If you do not
            specify a Region, the bucket is created in the us-east-1 Region.
          enum:
            - af-south-1
            - ap-east-1
            - ap-northeast-1
            - ap-northeast-2
            - ap-northeast-3
            - ap-south-1
            - ap-south-2
            - ap-southeast-1
            - ap-southeast-2
            - ap-southeast-3
            - ca-central-1
            - eu-central-1
            - eu-north-1
            - eu-south-1
            - eu-south-2
            - eu-west-1
            - eu-west-2
            - eu-west-3
            - me-south-1
            - sa-east-1
            - us-east-2
            - us-west-1
            - us-west-2
        Location:
          type: object
          description: Specifies the location of the bucket.
          properties:
            Name:
              type: string
            Type:
              type: string
              enum:
                - AvailabilityZone
        Bucket:
          type: object
          description: Specifies the information about the bucket to create.
          properties:
            DataRedundancy:
              type: string
              enum:
                - SingleAvailabilityZone
            Type:
              type: string
              enum:
                - Directory
    ListBucketResult:
      type: object
      description: Container for the result of the ListObjectsV2 operation.
      xml:
        name: ListBucketResult
        namespace: http://s3.amazonaws.com/doc/2006-03-01/
      properties:
        IsTruncated:
          type: boolean
          description: >-
            Set to false if all of the results were returned. Set to true if
            more keys are available to return.
        Contents:
          type: array
          items:
            $ref: '#/components/schemas/Object'
        Name:
          type: string
          description: Bucket name.
        Prefix:
          type: string
          description: Keys that begin with the indicated prefix.
        Delimiter:
          type: string
          description: Causes keys that contain the same string between the prefix and the first occurrence of the delimiter to be rolled up into a single result element.
        MaxKeys:
          type: integer
          description: Sets the maximum number of keys returned in the response.
        CommonPrefixes:
          type: array
          items:
            $ref: '#/components/schemas/CommonPrefix'
        EncodingType:
          type: string
          description: Encoding type used by Amazon S3 to encode object key names.
        KeyCount:
          type: integer
          description: The number of keys returned with this request.
        ContinuationToken:
          type: string
          description: >-
            If ContinuationToken was sent with the request, it is included in
            the response.
        NextContinuationToken:
          type: string
          description: >-
            NextContinuationToken is sent when isTruncated is true, which
            indicates that there are more keys to return.
        StartAfter:
          type: string
          description: >-
            If StartAfter was sent with the request, it is included in the
            response.
    Object:
      type: object
      description: An object consists of data and its descriptive metadata.
      properties:
        Key:
          type: string
          description: The name assigned to an object which identifies it in the bucket.
        LastModified:
          type: string
          format: date-time
          description: Date and time the object was last modified.
        ETag:
          type: string
          description: >-
            The entity tag is a hash of the object. The ETag reflects changes
            only to the contents of an object, not its metadata.
        Size:
          type: integer
          format: int64
          description: Size in bytes of the object.
        StorageClass:
          type: string
          description: The class of storage used to store the object.
          enum:
            - STANDARD
            - REDUCED_REDUNDANCY
            - GLACIER
            - STANDARD_IA
            - ONEZONE_IA
            - INTELLIGENT_TIERING
            - DEEP_ARCHIVE
            - OUTPOSTS
            - GLACIER_IR
            - SNOW
            - EXPRESS_ONEZONE
        Owner:
          $ref: '#/components/schemas/Owner'
        ChecksumAlgorithm:
          type: array
          items:
            type: string
            enum:
              - CRC32
              - CRC32C
              - SHA1
              - SHA256
        RestoreStatus:
          type: object
          properties:
            IsRestoreInProgress:
              type: boolean
            RestoreExpiryDate:
              type: string
              format: date-time
    CommonPrefix:
      type: object
      description: >-
        Container for all (if there are any) keys between Prefix and the next
        occurrence of the string specified by a delimiter.
      properties:
        Prefix:
          type: string
          description: Container for the specified common prefix.
    CopyObjectResult:
      type: object
      description: Container for all response elements.
      xml:
        name: CopyObjectResult
        namespace: http://s3.amazonaws.com/doc/2006-03-01/
      properties:
        ETag:
          type: string
          description: Returns the ETag of the new object.
        LastModified:
          type: string
          format: date-time
          description: Creation date of the object.
        ChecksumCRC32:
          type: string
        ChecksumCRC32C:
          type: string
        ChecksumSHA1:
          type: string
        ChecksumSHA256:
          type: string
    Delete:
      type: object
      description: Container for the objects to delete.
      xml:
        name: Delete
        namespace: http://s3.amazonaws.com/doc/2006-03-01/
      required:
        - Object
      properties:
        Object:
          type: array
          description: Container element that describes the delete request for an object.
          items:
            type: object
            required:
              - Key
            properties:
              Key:
                type: string
                description: Key name of the object to delete.
              VersionId:
                type: string
                description: VersionId for the specific version of the object to delete.
        Quiet:
          type: boolean
          description: >-
            Element to enable quiet mode for the request. When added, it must be
            set to true.
          default: false
    DeleteResult:
      type: object
      description: Container for the response of the DeleteObjects operation.
      xml:
        name: DeleteResult
        namespace: http://s3.amazonaws.com/doc/2006-03-01/
      properties:
        Deleted:
          type: array
          items:
            type: object
            properties:
              Key:
                type: string
              VersionId:
                type: string
              DeleteMarker:
                type: boolean
              DeleteMarkerVersionId:
                type: string
        Error:
          type: array
          items:
            type: object
            properties:
              Key:
                type: string
              VersionId:
                type: string
              Code:
                type: string
              Message:
                type: string
    InitiateMultipartUploadResult:
      type: object
      description: Container for response to initiate multipart upload.
      xml:
        name: InitiateMultipartUploadResult
        namespace: http://s3.amazonaws.com/doc/2006-03-01/
      properties:
        Bucket:
          type: string
          description: The name of the bucket to which the multipart upload was initiated.
        Key:
          type: string
          description: Object key for which the multipart upload was initiated.
        UploadId:
          type: string
          description: >-
            ID for the initiated multipart upload. This ID is used in all
            subsequent multipart upload operations.
    CompleteMultipartUpload:
      type: object
      description: The container for the completed multipart upload request.
      xml:
        name: CompleteMultipartUpload
        namespace: http://s3.amazonaws.com/doc/2006-03-01/
      properties:
        Part:
          type: array
          items:
            type: object
            required:
              - ETag
              - PartNumber
            properties:
              ETag:
                type: string
                description: Entity tag returned when the part was uploaded.
              PartNumber:
                type: integer
                description: Part number that identifies the part.
              ChecksumCRC32:
                type: string
              ChecksumCRC32C:
                type: string
              ChecksumSHA1:
                type: string
              ChecksumSHA256:
                type: string
    CompleteMultipartUploadResult:
      type: object
      description: The container for the completed multipart upload response.
      xml:
        name: CompleteMultipartUploadResult
        namespace: http://s3.amazonaws.com/doc/2006-03-01/
      properties:
        Location:
          type: string
          description: The URI that identifies the newly created object.
        Bucket:
          type: string
          description: The name of the bucket that contains the newly created object.
        Key:
          type: string
          description: The object key of the newly created object.
        ETag:
          type: string
          description: Entity tag that identifies the newly created object's data.
        ChecksumCRC32:
          type: string
        ChecksumCRC32C:
          type: string
        ChecksumSHA1:
          type: string
        ChecksumSHA256:
          type: string
    AccessControlPolicy:
      type: object
      description: Contains the elements that set the ACL permissions for an object per grantee.
      xml:
        name: AccessControlPolicy
        namespace: http://s3.amazonaws.com/doc/2006-03-01/
      properties:
        Owner:
          $ref: '#/components/schemas/Owner'
        AccessControlList:
          type: object
          properties:
            Grant:
              type: array
              items:
                $ref: '#/components/schemas/Grant'
    Grant:
      type: object
      description: Container for grant information.
      properties:
        Grantee:
          type: object
          description: The person being granted permissions.
          properties:
            DisplayName:
              type: string
            EmailAddress:
              type: string
            ID:
              type: string
            Type:
              type: string
              enum:
                - CanonicalUser
                - AmazonCustomerByEmail
                - Group
            URI:
              type: string
        Permission:
          type: string
          description: Specifies the permission given to the grantee.
          enum:
            - FULL_CONTROL
            - WRITE
            - WRITE_ACP
            - READ
            - READ_ACP
    VersioningConfiguration:
      type: object
      description: Container for setting the versioning state.
      xml:
        name: VersioningConfiguration
        namespace: http://s3.amazonaws.com/doc/2006-03-01/
      properties:
        Status:
          type: string
          description: The versioning state of the bucket.
          enum:
            - Enabled
            - Suspended
        MFADelete:
          type: string
          description: >-
            Specifies whether MFA delete is enabled in the bucket versioning
            configuration.
          enum:
            - Enabled
            - Disabled
    Tagging:
      type: object
      description: Container for TagSet elements.
      xml:
        name: Tagging
        namespace: http://s3.amazonaws.com/doc/2006-03-01/
      required:
        - TagSet
      properties:
        TagSet:
          type: object
          properties:
            Tag:
              type: array
              items:
                $ref: '#/components/schemas/Tag'
    Tag:
      type: object
      description: A container of a key value name pair.
      required:
        - Key
        - Value
      properties:
        Key:
          type: string
          description: Name of the object key.
          minLength: 1
          maxLength: 128
        Value:
          type: string
          description: Value of the tag.
          maxLength: 256
    ServerSideEncryptionConfiguration:
      type: object
      description: Specifies the default server-side-encryption configuration.
      xml:
        name: ServerSideEncryptionConfiguration
        namespace: http://s3.amazonaws.com/doc/2006-03-01/
      required:
        - Rule
      properties:
        Rule:
          type: array
          items:
            type: object
            properties:
              ApplyServerSideEncryptionByDefault:
                type: object
                properties:
                  SSEAlgorithm:
                    type: string
                    description: Server-side encryption algorithm to use for the default encryption.
                    enum:
                      - AES256
                      - aws:kms
                      - aws:kms:dsse
                  KMSMasterKeyID:
                    type: string
                    description: >-
                      AWS Key Management Service (KMS) customer managed key ID
                      to use for the default encryption.
              BucketKeyEnabled:
                type: boolean
                description: >-
                  Specifies whether Amazon S3 should use an S3 Bucket Key with
                  server-side encryption using KMS (SSE-KMS).
    BucketLifecycleConfiguration:
      type: object
      description: Container for lifecycle rules.
      xml:
        name: LifecycleConfiguration
        namespace: http://s3.amazonaws.com/doc/2006-03-01/
      required:
        - Rule
      properties:
        Rule:
          type: array
          items:
            $ref: '#/components/schemas/LifecycleRule'
    LifecycleRule:
      type: object
      description: A lifecycle rule for individual objects in an Amazon S3 bucket.
      required:
        - Status
      properties:
        ID:
          type: string
          description: Unique identifier for the rule.
        Filter:
          type: object
          description: The filter used to identify objects for the rule.
          properties:
            Prefix:
              type: string
            Tag:
              $ref: '#/components/schemas/Tag'
            And:
              type: object
              properties:
                Prefix:
                  type: string
                Tags:
                  type: array
                  items:
                    $ref: '#/components/schemas/Tag'
                ObjectSizeGreaterThan:
                  type: integer
                  format: int64
                ObjectSizeLessThan:
                  type: integer
                  format: int64
            ObjectSizeGreaterThan:
              type: integer
              format: int64
            ObjectSizeLessThan:
              type: integer
              format: int64
        Status:
          type: string
          description: >-
            If Enabled, Amazon S3 executes the lifecycle actions. If Disabled,
            Amazon S3 ignores the lifecycle actions.
          enum:
            - Enabled
            - Disabled
        Expiration:
          type: object
          properties:
            Date:
              type: string
              format: date-time
            Days:
              type: integer
            ExpiredObjectDeleteMarker:
              type: boolean
        Transition:
          type: array
          items:
            type: object
            properties:
              Date:
                type: string
                format: date-time
              Days:
                type: integer
              StorageClass:
                type: string
                enum:
                  - GLACIER
                  - STANDARD_IA
                  - ONEZONE_IA
                  - INTELLIGENT_TIERING
                  - DEEP_ARCHIVE
                  - GLACIER_IR
        NoncurrentVersionExpiration:
          type: object
          properties:
            NoncurrentDays:
              type: integer
            NewerNoncurrentVersions:
              type: integer
        NoncurrentVersionTransition:
          type: array
          items:
            type: object
            properties:
              NoncurrentDays:
                type: integer
              StorageClass:
                type: string
              NewerNoncurrentVersions:
                type: integer
        AbortIncompleteMultipartUpload:
          type: object
          properties:
            DaysAfterInitiation:
              type: integer
    CORSConfiguration:
      type: object
      description: Describes the cross-origin access configuration for objects in an Amazon S3 bucket.
      xml:
        name: CORSConfiguration
        namespace: http://s3.amazonaws.com/doc/2006-03-01/
      required:
        - CORSRule
      properties:
        CORSRule:
          type: array
          items:
            type: object
            required:
              - AllowedMethods
              - AllowedOrigins
            properties:
              ID:
                type: string
              AllowedHeaders:
                type: array
                items:
                  type: string
              AllowedMethods:
                type: array
                items:
                  type: string
                  enum:
                    - GET
                    - PUT
                    - HEAD
                    - POST
                    - DELETE
              AllowedOrigins:
                type: array
                items:
                  type: string
              ExposeHeaders:
                type: array
                items:
                  type: string
              MaxAgeSeconds:
                type: integer
    Error:
      type: object
      description: Container for all error elements.
      xml:
        name: Error
      properties:
        Code:
          type: string
          description: >-
            The error code is a string that uniquely identifies an error
            condition. Examples include NoSuchBucket, NoSuchKey, AccessDenied,
            InvalidBucketName, etc.
        Message:
          type: string
          description: A human-readable description of the error.
        Resource:
          type: string
          description: The bucket or object that is involved in the error.
        RequestId:
          type: string
          description: Unique identifier for the request.
        HostId:
          type: string
          description: A special token to help AWS troubleshoot problems.
