openapi: 3.1.0
info:
  title: Amazon S3 Tables API
  description: >-
    Amazon S3 Tables API provides operations for managing table buckets and
    tables stored in Apache Iceberg format. S3 Tables deliver the first
    cloud object store with built-in Apache Iceberg support, enabling
    analytics workloads on tabular data stored in Apache Parquet format within
    Amazon S3. S3 Tables provide storage optimized specifically for tabular
    data, with automated compaction, snapshot management, and Iceberg metadata
    management.
  version: '2024-12-11'
  contact:
    name: AWS Support
    url: https://aws.amazon.com/premiumsupport/
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: https://aws.amazon.com/service-terms/
  x-logo:
    url: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
externalDocs:
  description: Amazon S3 Tables API Reference
  url: https://docs.aws.amazon.com/AmazonS3/latest/API/API_Operations_Amazon_S3_Tables.html
servers:
  - url: https://s3tables.{region}.amazonaws.com
    description: Amazon S3 Tables regional endpoint
    variables:
      region:
        default: us-east-1
        description: AWS region
        enum:
          - us-east-1
          - us-east-2
          - us-west-2
          - eu-west-1
          - eu-central-1
          - ap-northeast-1
          - ap-southeast-1
security:
  - sigv4: []
tags:
  - name: Table Buckets
    description: Operations for creating and managing S3 table buckets
  - name: Tables
    description: Operations for creating and managing tables within table buckets
  - name: Namespaces
    description: Operations for managing namespaces within table buckets
  - name: Table Maintenance
    description: Operations for managing table maintenance configurations
  - name: Table Policy
    description: Operations for managing table and table bucket policies
paths:
  /buckets:
    get:
      operationId: ListTableBuckets
      summary: List Table Buckets
      description: >-
        Lists table buckets for your account. Returns a list of table buckets
        that you have access to.
      tags:
        - Table Buckets
      parameters:
        - name: prefix
          in: query
          description: The prefix of the table buckets.
          schema:
            type: string
        - name: continuationToken
          in: query
          description: >-
            ContinuationToken indicates to S3 Tables that the list is being
            continued with a token.
          schema:
            type: string
        - name: maxBuckets
          in: query
          description: The maximum number of table buckets to return in the list.
          schema:
            type: integer
            minimum: 1
            maximum: 1000
      responses:
        '200':
          description: Successfully returned list of table buckets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListTableBucketsResponse'
        '403':
          description: Access denied.
        '429':
          description: Too many requests.
    put:
      operationId: CreateTableBucket
      summary: Create Table Bucket
      description: >-
        Creates a table bucket. A table bucket is a resource that you can use to
        create and store tables. Each table bucket can contain tables in Apache
        Iceberg format stored as Apache Parquet files.
      tags:
        - Table Buckets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTableBucketRequest'
      responses:
        '200':
          description: Table bucket created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  arn:
                    type: string
                    description: The Amazon Resource Name (ARN) of the table bucket.
        '409':
          description: A table bucket with this name already exists.
        '429':
          description: Too many requests.
  /buckets/{tableBucketARN}:
    get:
      operationId: GetTableBucket
      summary: Get Table Bucket
      description: >-
        Gets details about a table bucket. Returns information about the
        specified table bucket including its name, ARN, owner, and creation date.
      tags:
        - Table Buckets
      parameters:
        - $ref: '#/components/parameters/TableBucketARN'
      responses:
        '200':
          description: Successfully returned table bucket details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TableBucket'
        '404':
          description: The specified table bucket does not exist.
    delete:
      operationId: DeleteTableBucket
      summary: Delete Table Bucket
      description: >-
        Deletes a table bucket. The table bucket must be empty (all tables and
        namespaces must be deleted first) before it can be deleted.
      tags:
        - Table Buckets
      parameters:
        - $ref: '#/components/parameters/TableBucketARN'
      responses:
        '204':
          description: Table bucket deleted successfully.
        '404':
          description: The specified table bucket does not exist.
        '409':
          description: The table bucket is not empty and cannot be deleted.
  /buckets/{tableBucketARN}/policy:
    get:
      operationId: GetTableBucketPolicy
      summary: Get Table Bucket Policy
      description: >-
        Gets details about a table bucket policy. Returns the policy document
        associated with the specified table bucket.
      tags:
        - Table Policy
      parameters:
        - $ref: '#/components/parameters/TableBucketARN'
      responses:
        '200':
          description: Successfully returned table bucket policy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  resourcePolicy:
                    type: string
                    description: The resource policy document in JSON format.
        '404':
          description: The table bucket policy does not exist.
    put:
      operationId: PutTableBucketPolicy
      summary: Put Table Bucket Policy
      description: >-
        Creates or replaces a table bucket policy for a table bucket.
      tags:
        - Table Policy
      parameters:
        - $ref: '#/components/parameters/TableBucketARN'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - resourcePolicy
              properties:
                resourcePolicy:
                  type: string
                  description: The resource policy document in JSON format.
      responses:
        '200':
          description: Table bucket policy updated successfully.
        '400':
          description: Invalid policy document.
    delete:
      operationId: DeleteTableBucketPolicy
      summary: Delete Table Bucket Policy
      description: >-
        Deletes a table bucket policy for a table bucket.
      tags:
        - Table Policy
      parameters:
        - $ref: '#/components/parameters/TableBucketARN'
      responses:
        '204':
          description: Table bucket policy deleted successfully.
  /buckets/{tableBucketARN}/maintenance:
    get:
      operationId: GetTableBucketMaintenanceConfiguration
      summary: Get Table Bucket Maintenance Configuration
      description: >-
        Gets details about a table bucket maintenance configuration, including
        Iceberg compaction and snapshot management settings.
      tags:
        - Table Maintenance
      parameters:
        - $ref: '#/components/parameters/TableBucketARN'
      responses:
        '200':
          description: Successfully returned maintenance configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TableBucketMaintenanceConfiguration'
        '404':
          description: The specified table bucket does not exist.
    put:
      operationId: PutTableBucketMaintenanceConfiguration
      summary: Put Table Bucket Maintenance Configuration
      description: >-
        Creates or updates a table bucket maintenance configuration for the
        specified table bucket. This includes Iceberg compaction and snapshot
        management.
      tags:
        - Table Maintenance
      parameters:
        - $ref: '#/components/parameters/TableBucketARN'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutTableBucketMaintenanceConfigurationRequest'
      responses:
        '200':
          description: Maintenance configuration updated successfully.
        '400':
          description: Invalid maintenance configuration.
  /namespaces/{tableBucketARN}:
    get:
      operationId: ListNamespaces
      summary: List Namespaces
      description: >-
        Lists the namespaces within a table bucket. Namespaces organize tables
        within a table bucket.
      tags:
        - Namespaces
      parameters:
        - $ref: '#/components/parameters/TableBucketARN'
        - name: prefix
          in: query
          description: The prefix of the namespaces.
          schema:
            type: string
        - name: continuationToken
          in: query
          description: A continuation token for pagination.
          schema:
            type: string
        - name: maxNamespaces
          in: query
          description: The maximum number of namespaces to return.
          schema:
            type: integer
            minimum: 1
            maximum: 1000
      responses:
        '200':
          description: Successfully returned list of namespaces.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListNamespacesResponse'
        '404':
          description: The specified table bucket does not exist.
    put:
      operationId: CreateNamespace
      summary: Create Namespace
      description: >-
        Creates a namespace. A namespace is a logical grouping of tables within a
        table bucket.
      tags:
        - Namespaces
      parameters:
        - $ref: '#/components/parameters/TableBucketARN'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - namespace
              properties:
                namespace:
                  type: array
                  description: >-
                    A name for the namespace. The namespace must be unique within
                    the table bucket.
                  items:
                    type: string
      responses:
        '200':
          description: Namespace created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  namespace:
                    type: array
                    items:
                      type: string
                  tableBucketARN:
                    type: string
        '409':
          description: A namespace with this name already exists.
  /namespaces/{tableBucketARN}/{namespace}:
    get:
      operationId: GetNamespace
      summary: Get Namespace
      description: >-
        Gets details about a namespace within a table bucket.
      tags:
        - Namespaces
      parameters:
        - $ref: '#/components/parameters/TableBucketARN'
        - $ref: '#/components/parameters/Namespace'
      responses:
        '200':
          description: Successfully returned namespace details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NamespaceDetail'
        '404':
          description: The specified namespace does not exist.
    delete:
      operationId: DeleteNamespace
      summary: Delete Namespace
      description: >-
        Deletes a namespace. The namespace must be empty (all tables must be
        deleted first) before it can be deleted.
      tags:
        - Namespaces
      parameters:
        - $ref: '#/components/parameters/TableBucketARN'
        - $ref: '#/components/parameters/Namespace'
      responses:
        '204':
          description: Namespace deleted successfully.
        '404':
          description: The specified namespace does not exist.
        '409':
          description: The namespace is not empty and cannot be deleted.
  /tables/{tableBucketARN}/{namespace}:
    get:
      operationId: ListTables
      summary: List Tables
      description: >-
        Lists the tables in the specified namespace within a table bucket.
      tags:
        - Tables
      parameters:
        - $ref: '#/components/parameters/TableBucketARN'
        - $ref: '#/components/parameters/Namespace'
        - name: prefix
          in: query
          description: The prefix of the table names.
          schema:
            type: string
        - name: continuationToken
          in: query
          description: A continuation token for pagination.
          schema:
            type: string
        - name: maxTables
          in: query
          description: The maximum number of tables to return.
          schema:
            type: integer
            minimum: 1
            maximum: 1000
      responses:
        '200':
          description: Successfully returned list of tables.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListTablesResponse'
        '404':
          description: The specified namespace does not exist.
    put:
      operationId: CreateTable
      summary: Create Table
      description: >-
        Creates a new table in the specified namespace within a table bucket. The
        table is created in Apache Iceberg format and data is stored in Apache
        Parquet format.
      tags:
        - Tables
      parameters:
        - $ref: '#/components/parameters/TableBucketARN'
        - $ref: '#/components/parameters/Namespace'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTableRequest'
      responses:
        '200':
          description: Table created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  tableARN:
                    type: string
                    description: The Amazon Resource Name (ARN) of the table.
                  versionToken:
                    type: string
                    description: The version token for the table.
        '409':
          description: A table with this name already exists.
  /tables/{tableBucketARN}/{namespace}/{name}:
    get:
      operationId: GetTable
      summary: Get Table
      description: >-
        Gets details about a table in the specified namespace within a table
        bucket.
      tags:
        - Tables
      parameters:
        - $ref: '#/components/parameters/TableBucketARN'
        - $ref: '#/components/parameters/Namespace'
        - name: name
          in: path
          required: true
          description: The name of the table.
          schema:
            type: string
      responses:
        '200':
          description: Successfully returned table details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TableDetail'
        '404':
          description: The specified table does not exist.
    delete:
      operationId: DeleteTable
      summary: Delete Table
      description: >-
        Deletes a table from the specified namespace within a table bucket.
      tags:
        - Tables
      parameters:
        - $ref: '#/components/parameters/TableBucketARN'
        - $ref: '#/components/parameters/Namespace'
        - name: name
          in: path
          required: true
          description: The name of the table to delete.
          schema:
            type: string
        - name: versionToken
          in: query
          description: The version token of the table.
          schema:
            type: string
      responses:
        '204':
          description: Table deleted successfully.
        '404':
          description: The specified table does not exist.
    post:
      operationId: RenameTable
      summary: Rename Table
      description: >-
        Renames a table or moves a table to a different namespace within a table
        bucket.
      tags:
        - Tables
      parameters:
        - $ref: '#/components/parameters/TableBucketARN'
        - $ref: '#/components/parameters/Namespace'
        - name: name
          in: path
          required: true
          description: The current name of the table.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                versionToken:
                  type: string
                  description: The version token of the table.
                newNamespaceName:
                  type: string
                  description: >-
                    The new namespace for the table. If not specified, the table
                    stays in the current namespace.
                newName:
                  type: string
                  description: The new name for the table.
      responses:
        '200':
          description: Table renamed successfully.
        '404':
          description: The specified table does not exist.
        '409':
          description: A table with the new name already exists.
  /tables/{tableBucketARN}/{namespace}/{name}/policy:
    get:
      operationId: GetTablePolicy
      summary: Get Table Policy
      description: >-
        Gets the resource policy for a table.
      tags:
        - Table Policy
      parameters:
        - $ref: '#/components/parameters/TableBucketARN'
        - $ref: '#/components/parameters/Namespace'
        - name: name
          in: path
          required: true
          description: The name of the table.
          schema:
            type: string
      responses:
        '200':
          description: Successfully returned table policy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  resourcePolicy:
                    type: string
        '404':
          description: The table policy does not exist.
    put:
      operationId: PutTablePolicy
      summary: Put Table Policy
      description: >-
        Creates or replaces the resource policy for a table.
      tags:
        - Table Policy
      parameters:
        - $ref: '#/components/parameters/TableBucketARN'
        - $ref: '#/components/parameters/Namespace'
        - name: name
          in: path
          required: true
          description: The name of the table.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - resourcePolicy
              properties:
                resourcePolicy:
                  type: string
                  description: The resource policy document in JSON format.
      responses:
        '200':
          description: Table policy updated successfully.
    delete:
      operationId: DeleteTablePolicy
      summary: Delete Table Policy
      description: >-
        Deletes the resource policy for a table.
      tags:
        - Table Policy
      parameters:
        - $ref: '#/components/parameters/TableBucketARN'
        - $ref: '#/components/parameters/Namespace'
        - name: name
          in: path
          required: true
          description: The name of the table.
          schema:
            type: string
      responses:
        '204':
          description: Table policy deleted successfully.
  /tables/{tableBucketARN}/{namespace}/{name}/maintenance:
    get:
      operationId: GetTableMaintenanceConfiguration
      summary: Get Table Maintenance Configuration
      description: >-
        Gets details about the maintenance configuration of a table, including
        Iceberg compaction and snapshot management settings.
      tags:
        - Table Maintenance
      parameters:
        - $ref: '#/components/parameters/TableBucketARN'
        - $ref: '#/components/parameters/Namespace'
        - name: name
          in: path
          required: true
          description: The name of the table.
          schema:
            type: string
      responses:
        '200':
          description: Successfully returned table maintenance configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TableMaintenanceConfiguration'
        '404':
          description: The specified table does not exist.
    put:
      operationId: PutTableMaintenanceConfiguration
      summary: Put Table Maintenance Configuration
      description: >-
        Creates or updates the maintenance configuration for the specified table.
      tags:
        - Table Maintenance
      parameters:
        - $ref: '#/components/parameters/TableBucketARN'
        - $ref: '#/components/parameters/Namespace'
        - name: name
          in: path
          required: true
          description: The name of the table.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutTableMaintenanceConfigurationRequest'
      responses:
        '200':
          description: Table maintenance configuration updated successfully.
  /tables/{tableBucketARN}/{namespace}/{name}/maintenance-job-status:
    get:
      operationId: GetTableMaintenanceJobStatus
      summary: Get Table Maintenance Job Status
      description: >-
        Gets the status of a maintenance job for a table, including the last
        run timestamp and status.
      tags:
        - Table Maintenance
      parameters:
        - $ref: '#/components/parameters/TableBucketARN'
        - $ref: '#/components/parameters/Namespace'
        - name: name
          in: path
          required: true
          description: The name of the table.
          schema:
            type: string
      responses:
        '200':
          description: Successfully returned maintenance job status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TableMaintenanceJobStatus'
        '404':
          description: The specified table does not exist.
  /tables/{tableBucketARN}/{namespace}/{name}/metadata-location:
    get:
      operationId: GetTableMetadataLocation
      summary: Get Table Metadata Location
      description: >-
        Gets the location of the table metadata in S3.
      tags:
        - Tables
      parameters:
        - $ref: '#/components/parameters/TableBucketARN'
        - $ref: '#/components/parameters/Namespace'
        - name: name
          in: path
          required: true
          description: The name of the table.
          schema:
            type: string
      responses:
        '200':
          description: Successfully returned table metadata location.
          content:
            application/json:
              schema:
                type: object
                properties:
                  versionToken:
                    type: string
                  metadataLocation:
                    type: string
                    description: The S3 URI of the table metadata file.
                  warehouseLocation:
                    type: string
                    description: The S3 URI of the warehouse location.
    put:
      operationId: UpdateTableMetadataLocation
      summary: Update Table Metadata Location
      description: >-
        Updates the metadata location for a table. Used to point the table to a
        new Iceberg metadata file after a metadata update.
      tags:
        - Tables
      parameters:
        - $ref: '#/components/parameters/TableBucketARN'
        - $ref: '#/components/parameters/Namespace'
        - name: name
          in: path
          required: true
          description: The name of the table.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - versionToken
                - metadataLocation
              properties:
                versionToken:
                  type: string
                  description: The version token of the table.
                metadataLocation:
                  type: string
                  description: The new S3 URI for the table metadata file.
      responses:
        '200':
          description: Table metadata location updated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  tableARN:
                    type: string
                  versionToken:
                    type: string
                  metadataLocation:
                    type: string
components:
  securitySchemes:
    sigv4:
      type: apiKey
      name: Authorization
      in: header
      description: >-
        AWS Signature Version 4 authentication. The S3 Tables API uses the
        service name s3tables for signing.
  parameters:
    TableBucketARN:
      name: tableBucketARN
      in: path
      required: true
      description: The Amazon Resource Name (ARN) of the table bucket.
      schema:
        type: string
    Namespace:
      name: namespace
      in: path
      required: true
      description: The name of the namespace.
      schema:
        type: string
  schemas:
    ListTableBucketsResponse:
      type: object
      properties:
        tableBuckets:
          type: array
          items:
            $ref: '#/components/schemas/TableBucketSummary'
        continuationToken:
          type: string
          description: A continuation token for paginating the list.
    TableBucketSummary:
      type: object
      properties:
        arn:
          type: string
          description: The Amazon Resource Name (ARN) of the table bucket.
        name:
          type: string
          description: The name of the table bucket.
        ownerAccountId:
          type: string
          description: The account ID of the owner of the table bucket.
        createdAt:
          type: string
          format: date-time
          description: The date and time when the table bucket was created.
    TableBucket:
      type: object
      properties:
        arn:
          type: string
          description: The Amazon Resource Name (ARN) of the table bucket.
        name:
          type: string
          description: The name of the table bucket.
        ownerAccountId:
          type: string
          description: The account ID of the owner.
        createdAt:
          type: string
          format: date-time
          description: The date and time when the table bucket was created.
        unreferencedFileRemoval:
          type: object
          description: The unreferenced file removal settings for the table bucket.
          properties:
            status:
              type: string
              enum:
                - Enabled
                - Disabled
            settings:
              type: object
              properties:
                unreferencedDays:
                  type: integer
                  description: Number of days before unreferenced files are removed.
                nonCurrentDays:
                  type: integer
                  description: Number of days for non-current data.
    CreateTableBucketRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: The name for the table bucket.
          minLength: 3
          maxLength: 63
    ListNamespacesResponse:
      type: object
      properties:
        namespaces:
          type: array
          items:
            type: object
            properties:
              namespace:
                type: array
                items:
                  type: string
              createdAt:
                type: string
                format: date-time
              createdBy:
                type: string
              ownerAccountId:
                type: string
        continuationToken:
          type: string
    NamespaceDetail:
      type: object
      properties:
        namespace:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
        ownerAccountId:
          type: string
        tableBucketARN:
          type: string
    ListTablesResponse:
      type: object
      properties:
        tables:
          type: array
          items:
            $ref: '#/components/schemas/TableSummary'
        continuationToken:
          type: string
    TableSummary:
      type: object
      properties:
        namespace:
          type: array
          items:
            type: string
        name:
          type: string
          description: The name of the table.
        type:
          type: string
          description: The type of the table.
          enum:
            - customer
            - aws
        tableARN:
          type: string
          description: The Amazon Resource Name (ARN) of the table.
        createdAt:
          type: string
          format: date-time
        modifiedAt:
          type: string
          format: date-time
    CreateTableRequest:
      type: object
      required:
        - name
        - format
      properties:
        name:
          type: string
          description: The name for the table.
          minLength: 1
          maxLength: 255
        format:
          type: string
          description: The format of the table. Currently only ICEBERG is supported.
          enum:
            - ICEBERG
    TableDetail:
      type: object
      properties:
        name:
          type: string
          description: The name of the table.
        tableARN:
          type: string
          description: The Amazon Resource Name (ARN) of the table.
        namespace:
          type: array
          items:
            type: string
        versionToken:
          type: string
          description: The version token of the table.
        metadataLocation:
          type: string
          description: The S3 URI location of the table metadata.
        warehouseLocation:
          type: string
          description: The S3 URI of the warehouse location for the table.
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
        modifiedAt:
          type: string
          format: date-time
        modifiedBy:
          type: string
        managedByService:
          type: string
        ownerAccountId:
          type: string
        type:
          type: string
          enum:
            - customer
            - aws
        format:
