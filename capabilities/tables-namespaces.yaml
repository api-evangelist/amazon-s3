      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: tables-namespaces.createnamespace
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-s3-get-namespace
      description: Amazon S3 Get Namespace
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tables-namespaces.getnamespace
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-s3-delete-namespace
      description: Amazon S3 Delete Namespace
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: tables-namespaces.deletenamespace
      outputParameters:
      - type: object
        mapping: $.
