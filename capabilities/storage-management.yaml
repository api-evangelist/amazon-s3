          value: $.
      - name: create-job
        method: POST
        description: Create a Batch Operations job
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: describe-job
        method: GET
        description: Get details of a Batch Operations job
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Job ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-job-priority
        method: POST
        description: Update priority of a Batch Operations job
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Job ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-job-status
        method: POST
        description: Update status of a Batch Operations job
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Job ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: storage-lens
      path: /v20180820
      description: S3 Storage Lens configuration management
      operations:
      - name: list-storage-lens-configurations
        method: GET
        description: List Storage Lens configurations
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-storage-lens-configuration
        method: GET
        description: Get a Storage Lens configuration
        inputParameters:
        - name: storagelensid
          in: path
          type: string
          required: true
          description: Storage Lens configuration ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: put-storage-lens-configuration
        method: PUT
        description: Create or update a Storage Lens configuration
        inputParameters:
        - name: storagelensid
          in: path
          type: string
          required: true
          description: Storage Lens configuration ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-storage-lens-configuration
        method: DELETE
        description: Delete a Storage Lens configuration
        inputParameters:
        - name: storagelensid
          in: path
          type: string
          required: true
          description: Storage Lens configuration ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: public-access-block
      path: /v20180820
      description: Public access block settings
      operations:
      - name: get-public-access-block
        method: GET
        description: Get public access block configuration
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: put-public-access-block
        method: PUT
        description: Set public access block configuration
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-public-access-block
        method: DELETE
        description: Delete public access block configuration
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: s3-tables
    baseUri: https://s3tables.us-east-1.amazonaws.com
    description: Amazon S3 Tables API for tabular data storage
    authentication:
      type: apikey
      key: Authorization
      value: '{{AWS_ACCESS_KEY_ID}}'
      placement: header
    resources:
    - name: table-buckets
      path: /buckets
      description: S3 table bucket management
      operations:
      - name: list-table-buckets
        method: GET
        description: List table buckets for your account
        inputParameters:
        - name: prefix
          in: query
          type: string
          required: false
          description: Prefix filter for table buckets
        - name: maxBuckets
          in: query
          type: integer
          required: false
          description: Maximum number of buckets to return
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-table-bucket
        method: PUT
        description: Create a table bucket
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
      - name: get-table-bucket
        method: GET
        description: Get table bucket details
        inputParameters:
        - name: tableBucketARN
          in: path
          type: string
          required: true
          description: Table bucket ARN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-table-bucket
        method: DELETE
        description: Delete a table bucket
        inputParameters:
        - name: tableBucketARN
          in: path
          type: string
          required: true
          description: Table bucket ARN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: namespaces
      path: /namespaces
      description: Namespace management within table buckets
      operations:
      - name: list-namespaces
        method: GET
        description: List namespaces in a table bucket
        inputParameters:
        - name: tableBucketARN
          in: path
          type: string
          required: true
          description: Table bucket ARN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-namespace
        method: PUT
        description: Create a namespace
        inputParameters:
        - name: tableBucketARN
          in: path
          type: string
          required: true
          description: Table bucket ARN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            namespace: '{{tools.namespace}}'
      - name: get-namespace
        method: GET
        description: Get namespace details
        inputParameters:
        - name: tableBucketARN
          in: path
          type: string
          required: true
          description: Table bucket ARN
        - name: namespace
          in: path
          type: string
          required: true
          description: Namespace name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-namespace
        method: DELETE
        description: Delete a namespace
        inputParameters:
        - name: tableBucketARN
          in: path
          type: string
          required: true
          description: Table bucket ARN
        - name: namespace
          in: path
          type: string
          required: true
          description: Namespace name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: tables
      path: /tables
      description: Table management within namespaces
      operations:
      - name: list-tables
        method: GET
        description: List tables in a namespace
        inputParameters:
        - name: tableBucketARN
          in: path
          type: string
          required: true
          description: Table bucket ARN
        - name: namespace
          in: path
          type: string
          required: true
          description: Namespace name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-table
        method: PUT
        description: Create a table
        inputParameters:
        - name: tableBucketARN
          in: path
          type: string
          required: true
          description: Table bucket ARN
        - name: namespace
          in: path
          type: string
          required: true
          description: Namespace name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-table
        method: GET
        description: Get table details
        inputParameters:
        - name: tableBucketARN
          in: path
          type: string
          required: true
          description: Table bucket ARN
        - name: namespace
          in: path
          type: string
          required: true
          description: Namespace name
        - name: name
          in: path
          type: string
          required: true
          description: Table name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-table
        method: DELETE
        description: Delete a table
        inputParameters:
        - name: tableBucketARN
          in: path
          type: string
          required: true
          description: Table bucket ARN
        - name: namespace
          in: path
          type: string
          required: true
          description: Namespace name
        - name: name
          in: path
          type: string
          required: true
          description: Table name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: rename-table
        method: PUT
        description: Rename a table
        inputParameters:
        - name: tableBucketARN
          in: path
          type: string
          required: true
          description: Table bucket ARN
        - name: namespace
          in: path
          type: string
          required: true
          description: Namespace name
        - name: name
          in: path
          type: string
          required: true
          description: Current table name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: storage-management-api
    description: Unified REST API for Amazon S3 storage management.
    resources:
    - path: /v1/buckets
      name: buckets
      description: S3 buckets
      operations:
      - method: GET
        name: list-buckets
        description: List all S3 buckets
        call: s3-rest.list-buckets
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-bucket
        description: Create an S3 bucket
        call: s3-rest.create-bucket
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/buckets/{bucket}
      name: bucket
      description: Single S3 bucket
      operations:
      - method: HEAD
        name: head-bucket
        description: Check if a bucket exists
        call: s3-rest.head-bucket
        with:
          Bucket: rest.bucket
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-bucket
        description: Delete an S3 bucket
        call: s3-rest.delete-bucket
        with:
          Bucket: rest.bucket
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/buckets/{bucket}/objects
      name: objects
      description: Objects in a bucket
      operations:
      - method: GET
        name: list-objects
        description: List objects in a bucket
        call: s3-rest.list-objects-v2
        with:
          Bucket: rest.bucket
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/buckets/{bucket}/objects/{key}
      name: object
      description: Single object
      operations:
      - method: GET
        name: get-object
        description: Get an object
        call: s3-rest.get-object
        with:
          Bucket: rest.bucket
          Key: rest.key
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: put-object
        description: Upload an object
        call: s3-rest.put-object
        with:
          Bucket: rest.bucket
          Key: rest.key
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-object
        description: Delete an object
        call: s3-rest.delete-object
        with:
          Bucket: rest.bucket
          Key: rest.key
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/access-points
      name: access-points
      description: S3 access points
      operations:
      - method: GET
        name: list-access-points
        description: List S3 access points
        call: s3-control.list-access-points
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/access-points/{name}
      name: access-point
      description: Single access point
      operations:
      - method: GET
        name: get-access-point
        description: Get an access point
        call: s3-control.get-access-point
        with:
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/batch-jobs
      name: batch-jobs
      description: S3 Batch Operations jobs
      operations:
      - method: GET
        name: list-jobs
        description: List Batch Operations jobs
        call: s3-control.list-jobs
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-job
        description: Create a Batch Operations job
        call: s3-control.create-job
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/batch-jobs/{id}
      name: batch-job
      description: Single Batch Operations job
      operations:
      - method: GET
        name: describe-job
        description: Get details of a Batch Operations job
        call: s3-control.describe-job
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/storage-lens
      name: storage-lens
      description: Storage Lens configurations
      operations:
      - method: GET
        name: list-storage-lens
        description: List Storage Lens configurations
        call: s3-control.list-storage-lens-configurations
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/table-buckets
      name: table-buckets
      description: S3 table buckets
      operations:
      - method: GET
        name: list-table-buckets
        description: List S3 table buckets
        call: s3-tables.list-table-buckets
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/table-buckets/{arn}/tables
      name: tables
      description: Tables in a table bucket
      operations:
      - method: GET
        name: list-tables
        description: List tables in a namespace
        call: s3-tables.list-tables
        with:
          tableBucketARN: rest.arn
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: storage-management-mcp
    transport: http
    description: MCP server for AI-assisted Amazon S3 storage management.
    tools:
