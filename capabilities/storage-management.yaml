          value: $.
      - name: get-access-point
        method: GET
        description: Get access point configuration
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
          description: Access point name or ARN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-access-point
        method: PUT
        description: Create an access point
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
          description: Access point name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-access-point
        method: DELETE
        description: Delete an access point
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
          description: Access point name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: batch-operations
      path: /v20180820
      description: S3 Batch Operations job management
      operations:
      - name: list-jobs
        method: GET
        description: List Batch Operations jobs
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
