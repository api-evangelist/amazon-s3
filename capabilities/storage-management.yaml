      call: s3-rest.create-bucket
      with:
        Bucket: tools.bucket
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-bucket
      description: Delete an S3 bucket
      hints:
        readOnly: false
        destructive: true
      call: s3-rest.delete-bucket
      with:
        Bucket: tools.bucket
      outputParameters:
      - type: object
        mapping: $.
    - name: list-objects
      description: List objects in an S3 bucket
      hints:
        readOnly: true
        openWorld: true
      call: s3-rest.list-objects-v2
      with:
        Bucket: tools.bucket
      outputParameters:
      - type: object
        mapping: $.
    - name: get-object
      description: Retrieve an object from S3
      hints:
        readOnly: true
      call: s3-rest.get-object
      with:
        Bucket: tools.bucket
        Key: tools.key
      outputParameters:
      - type: object
        mapping: $.
    - name: put-object
      description: Upload an object to S3
      hints:
        readOnly: false
      call: s3-rest.put-object
      with:
        Bucket: tools.bucket
        Key: tools.key
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-object
      description: Delete an object from S3
      hints:
        readOnly: false
        destructive: true
