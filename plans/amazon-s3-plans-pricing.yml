specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Amazon S3
providerId: amazon-s3
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Amazon
  - AWS
  - Object Storage
  - Cloud Storage
  - Archive
  - Backup
description: Amazon S3 prices independently on storage (per GB-month, by storage class), requests (per
  1,000 by verb and class), data transfer (egress to internet beyond the 100 GB/month free pool), and
  optional features such as replication, S3 Tables, Glacier retrieval, and inventory. New customers receive
  up to $200 in AWS Free Tier credits valid 6 months. Prices listed are us-east-1 standard tier where
  applicable.
sources:
  - https://aws.amazon.com/s3/pricing/
plans:
  - id: amazon-s3-storage-classes
    name: Storage Classes
    type: usage-based
    description: Per-GB-month storage rates by class. Choose by access frequency and durability requirements.
    entries:
      - label: S3 Standard - First 50 TB / month
        name: storage_standard
        type: metered
        metric: gb-month
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: see vendor pricing calculator
        userMultiplied: false
      - label: S3 Intelligent-Tiering
        name: storage_intelligent
        type: metered
        metric: gb-month
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: see vendor pricing calculator
        userMultiplied: false
      - label: S3 Standard-IA
        name: storage_standard_ia
        type: metered
        metric: gb-month
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: see vendor pricing calculator
        userMultiplied: false
      - label: S3 One Zone-IA
        name: storage_onezone_ia
        type: metered
        metric: gb-month
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: see vendor pricing calculator
        userMultiplied: false
      - label: S3 Express One Zone
        name: storage_express
        type: metered
        metric: gb-month
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: see vendor pricing calculator
        userMultiplied: false
      - label: S3 Glacier Instant Retrieval
        name: storage_glacier_instant
        type: metered
        metric: gb-month
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: see vendor pricing calculator
        userMultiplied: false
      - label: S3 Glacier Flexible Retrieval
        name: storage_glacier_flexible
        type: metered
        metric: gb-month
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: see vendor pricing calculator
        userMultiplied: false
      - label: S3 Glacier Deep Archive
        name: storage_glacier_deep
        type: metered
        metric: gb-month
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: see vendor pricing calculator
        userMultiplied: false
    elements:
      - name: 8 storage classes for different access patterns
      - name: Per-GB-month metering
      - name: Lifecycle transitions between classes
  - id: amazon-s3-requests
    name: Request Pricing
    type: usage-based
    description: Per-1,000-request rates differ by verb and storage class. Standard tier rates listed.
    entries:
      - label: PUT, COPY, POST, LIST (Standard)
        name: req_put_standard
        type: metered
        metric: request
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1000
        price: '0.005'
        userMultiplied: false
      - label: GET, SELECT (Standard)
        name: req_get_standard
        type: metered
        metric: request
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1000
        price: '0.0004'
        userMultiplied: false
      - label: Glacier retrieval requests
        name: req_glacier
        type: metered
        metric: request
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1000
        price: see vendor pricing calculator
        userMultiplied: false
    elements:
      - name: Different rates for IA, One Zone-IA, Glacier classes
      - name: SELECT, retrieval, lifecycle transitions metered separately
  - id: amazon-s3-data-transfer
    name: Data Transfer
    type: usage-based
    description: Inbound is free; outbound to internet is metered after a 100 GB/month aggregated free
      pool.
    entries:
      - label: Data IN
        name: dt_in
        type: flat
        metric: gb
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Data OUT - first 100 GB/month
        name: dt_out_free
        type: quota
        metric: gb
        limit: 100
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Data OUT to internet - tiered
        name: dt_out_paid
        type: tiered
        metric: gb
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see vendor pricing calculator
        userMultiplied: false
      - label: Cross-Region replication / transfer
        name: dt_cross_region
        type: metered
        metric: gb
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.01'
        userMultiplied: false
      - label: Same-Region S3-to-S3
        name: dt_same_region
        type: flat
        metric: gb
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Free 100 GB/month outbound aggregated across services
      - name: Tiered egress pricing
  - id: amazon-s3-free-tier
    name: AWS Free Tier
    type: freemium
    description: New AWS customers receive up to $200 in AWS Free Tier credits applicable to S3 and other
      services for 6 months.
    entries:
      - label: AWS Free Tier credits
        name: free_credits
        type: quota
        metric: usd
        limit: 200
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Available to new accounts
      - name: 6-month expiry
      - name: Applies across S3 storage, requests, transfer
maintainers:
